name: release-binaries

# Build the release artifacts (macOS bridge binary, Homebrew tap bump, Dial
# firmware + manifest) and attach them to a GitHub Release. Called by the
# release-please workflow the moment it cuts a release (workflow_call, same run —
# so no cross-workflow token is needed and the GITHUB_TOKEN anti-recursion rule
# doesn't bite); can also be dispatched manually to (re)build an existing tag.
on:
  workflow_call:
    inputs:
      tag:
        description: "Tag to build and attach artifacts to (e.g. v0.4.0)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and attach artifacts to (e.g. v0.4.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    # Apple Silicon only — GitHub's Intel macOS runners are being retired and the
    # bridge ships to arm64 Macs. Add a macos-13/amd64 matrix entry to reinstate.
    runs-on: macos-14
    env:
      arch: arm64
    outputs:
      tag: ${{ steps.pkg.outputs.tag }}
      sha256: ${{ steps.pkg.outputs.sha256 }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: bridge/go.mod
          cache-dependency-path: bridge/go.sum

      # cgo is on by default on macOS; the BLE package links CoreBluetooth.
      - name: Build
        run: go -C bridge build -ldflags "-s -w" -o "$GITHUB_WORKSPACE/claude-dial" ./cmd/claude-dial

      - name: Package
        id: pkg
        run: |
          TAG="${{ inputs.tag }}"
          NAME="claude-dial_${TAG}_darwin_${arch}.tar.gz"
          tar -czf "$NAME" claude-dial LICENSE README.md
          shasum -a 256 "$NAME" | tee "$NAME.sha256"
          echo "tag=$TAG"     >> "$GITHUB_OUTPUT"
          echo "name=$NAME"   >> "$GITHUB_OUTPUT"
          echo "sha256=$(shasum -a 256 "$NAME" | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ steps.pkg.outputs.tag }}" \
            "${{ steps.pkg.outputs.name }}" "${{ steps.pkg.outputs.name }}.sha256" \
            --clobber --repo "$GITHUB_REPOSITORY"

  # Point the Homebrew tap at the freshly published binary. Needs a token that
  # can push to the *other* repo (bruno00o/homebrew-tap) — the default
  # GITHUB_TOKEN only reaches this one — so set a TAP_TOKEN secret (a
  # fine-grained PAT scoped to homebrew-tap with Contents: read/write). Absent
  # the secret this is a no-op, so the binary build never breaks.
  bump-tap:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Update tap formula
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
          TAG: ${{ needs.build.outputs.tag }}
          SHA256: ${{ needs.build.outputs.sha256 }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "TAP_TOKEN not set — skipping tap bump (binary is still published)."
            exit 0
          fi
          VERSION="${TAG#v}"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/bruno00o/homebrew-tap.git"
          cd homebrew-tap
          formula=Formula/claude-dial.rb
          url="https://github.com/bruno00o/claude-dial/releases/download/${TAG}/claude-dial_${TAG}_darwin_arm64.tar.gz"
          sed -i -E \
            -e "s|^  url \".*\"|  url \"${url}\"|" \
            -e "s|^  version \".*\"|  version \"${VERSION}\"|" \
            -e "s|^  sha256 \"[0-9a-f]{64}\"|  sha256 \"${SHA256}\"|" \
            "$formula"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$formula"
          git commit -m "claude-dial ${VERSION}" || { echo "formula already up to date"; exit 0; }
          git push

  # Build the Dial firmware and publish the app image + a firmware.json manifest
  # to the release. The daemon reads that manifest (releases/latest/download/
  # firmware.json) to flag available OTA updates; the .bin is what a future OTA
  # push (phase 2) flashes to the Dial's inactive partition.
  firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install PlatformIO + esptool
        # esptool<5 keeps the classic `merge_bin` + underscore flag syntax used below.
        run: pip install --upgrade platformio "esptool<5"

      - name: Build firmware
        run: |
          TAG="${{ inputs.tag }}"
          # Stamp the real release version into the image so it reports its true
          # version to the host, independent of the source fallback.
          printf '#define CLAUDE_DIAL_FW_VERSION "%s"\n' "${TAG#v}" \
            > firmware/claude-dial/src/version_override.h
          pio run -d firmware/claude-dial

      - name: Package images + manifest
        id: pkg
        run: |
          TAG="${{ inputs.tag }}"
          VERSION="${TAG#v}"
          BUILD=firmware/claude-dial/.pio/build/m5stack-dial

          # OTA app image (flashed to a partition over BLE by `firmware update`).
          BIN="claude-dial-firmware_${TAG}_esp32s3.bin"
          cp "$BUILD/firmware.bin" "$BIN"
          SHA="$(shasum -a 256 "$BIN" | cut -d' ' -f1)"
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${BIN}"

          # Full USB-flashable factory image: bootloader + partition table +
          # otadata + app, merged at their flash offsets so `firmware flash`
          # (esptool write_flash 0x0) lands claude-dial on a blank Dial. The
          # ESP32-S3 bootloader lives at 0x0 (unlike classic ESP32's 0x1000).
          BOOT_APP0="$(find "$HOME/.platformio/packages" -name boot_app0.bin | head -1)"
          FACTORY="claude-dial-firmware_${TAG}_esp32s3-factory.bin"
          esptool --chip esp32s3 merge_bin -o "$FACTORY" \
            --flash_mode dio --flash_freq 80m --flash_size 8MB \
            0x0 "$BUILD/bootloader.bin" \
            0x8000 "$BUILD/partitions.bin" \
            0xe000 "$BOOT_APP0" \
            0x10000 "$BUILD/firmware.bin"
          FSHA="$(shasum -a 256 "$FACTORY" | cut -d' ' -f1)"
          FURL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${FACTORY}"

          printf '{\n  "version": "%s",\n  "url": "%s",\n  "sha256": "%s",\n  "factory_url": "%s",\n  "factory_sha256": "%s"\n}\n' \
            "$VERSION" "$URL" "$SHA" "$FURL" "$FSHA" > firmware.json
          cat firmware.json
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "bin=$BIN" >> "$GITHUB_OUTPUT"
          echo "factory=$FACTORY" >> "$GITHUB_OUTPUT"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ steps.pkg.outputs.tag }}" \
            "${{ steps.pkg.outputs.bin }}" "${{ steps.pkg.outputs.factory }}" firmware.json \
            --clobber --repo "$GITHUB_REPOSITORY"
