<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>claude-dial</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --page:#0b0a08; --ink:#e9e2d6; --dim:#8a8175; --grey:#6f695f;
    --amber:#FFA62B; --amber-hot:#FFC46B; --red:#FF5B34;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{ background:radial-gradient(900px 480px at 50% -8%, #16130d, var(--page)), var(--page);
    color:var(--ink); font-family:Inter,system-ui,sans-serif; -webkit-font-smoothing:antialiased;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; padding:32px 16px; min-height:100%;}
  .title{font-family:"JetBrains Mono",monospace; font-size:12px; letter-spacing:.34em; text-transform:uppercase; color:var(--dim);}

  .device{padding:16px; border-radius:50%; background:linear-gradient(145deg,#2a2620,#0d0b09);
    box-shadow:0 24px 60px rgba(0,0,0,.6), inset 0 1px 1px rgba(255,255,255,.05);
    position:relative; cursor:pointer; touch-action:none; user-select:none;}
  .device::after{content:""; position:absolute; left:50%; bottom:-3px; transform:translateX(-50%); width:48px; height:6px; border-radius:6px; background:#090807; box-shadow:inset 0 1px 2px rgba(0,0,0,.8);}
  .knurl{position:absolute; inset:2px; border-radius:50%; pointer-events:none;
    -webkit-mask:radial-gradient(farthest-side, transparent calc(100% - 8px), #000 calc(100% - 7px));
            mask:radial-gradient(farthest-side, transparent calc(100% - 8px), #000 calc(100% - 7px));
    background:repeating-conic-gradient(from var(--rot,0deg), #211e18 0 3deg, #14110d 3deg 6deg);}
  .screen{width:320px; height:320px; border-radius:50%; overflow:hidden; position:relative; background:#0a0805;
    display:flex; align-items:center; justify-content:center; font-family:"JetBrains Mono",monospace;}
  .crt{position:absolute; inset:0; z-index:5; pointer-events:none; background:repeating-linear-gradient(rgba(0,0,0,0) 0 2px, rgba(0,0,0,.26) 2px 3px); mix-blend-mode:multiply;}
  .vig{position:absolute; inset:0; z-index:4; pointer-events:none; background:radial-gradient(105% 105% at 50% 45%, transparent 52%, rgba(0,0,0,.82) 100%);}
  .body{position:relative; z-index:1; width:232px;}

  /* roster */
  .hd{display:flex; justify-content:space-between; font-size:11.5px; color:var(--dim); padding-bottom:8px;}
  .hd .n{color:var(--amber);}
  .rule{height:1px; background:linear-gradient(90deg,transparent,#3a3327,transparent); margin:1px 0 9px;}
  .rows{display:flex; flex-direction:column; gap:9px;}
  .row{display:flex; align-items:center; gap:8px; font-size:13.5px; color:var(--grey); cursor:pointer;}
  .row .car{width:9px; color:var(--amber); opacity:0;}
  .row .nm{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .row .st{font-size:11.5px;}
  .row.sel{color:var(--ink);} .row.sel .car{opacity:1;}
  .row.work{color:var(--amber); text-shadow:0 0 7px rgba(255,166,43,.4);}
  .row.wait{color:var(--amber-hot); text-shadow:0 0 9px rgba(255,196,107,.55); animation:pulse 1.15s ease-in-out infinite;}
  .ft{display:flex; justify-content:space-between; font-size:11px; color:var(--dim); padding-top:11px;}
  .ft .w{color:var(--amber-hot);}
  @keyframes pulse{0%,100%{opacity:.6;} 50%{opacity:1;}}

  /* permission */
  .p-hd{display:flex; justify-content:space-between; align-items:baseline; font-size:13.5px; color:var(--amber); text-shadow:0 0 8px rgba(255,166,43,.5); padding-bottom:6px;}
  .p-hd .q{font-size:11px; color:var(--dim); text-shadow:none;}
  .p-warn{font-size:12px; color:var(--amber-hot); text-shadow:0 0 8px rgba(255,196,107,.5); margin:2px 0 6px;}
  .p-cmd{font-size:14px; color:var(--ink); word-break:break-all; margin-bottom:14px; line-height:1.35; max-height:56px; overflow:hidden;}
  .p-cmd .d{color:var(--amber);}
  .opt{font-size:14px; color:var(--grey); padding:3px 0; display:flex; gap:8px; align-items:center; cursor:pointer;}
  .opt .car{width:9px; color:var(--amber); opacity:0;}
  .opt.sel{color:var(--ink); text-shadow:0 0 9px rgba(255,166,43,.55);}
  .opt.sel .car{opacity:1;}
  .opt.rej.sel{color:var(--red); text-shadow:0 0 9px rgba(255,91,52,.6);}
  .opt.rej.sel .car{color:var(--red);}
  .p-ft{font-size:11px; color:var(--dim); margin-top:12px;}
  .cur{display:inline-block; width:8px; height:13px; background:var(--amber); vertical-align:-2px; margin-left:4px; animation:blink 1s steps(1) infinite; box-shadow:0 0 8px rgba(255,166,43,.7);}
  @keyframes blink{0%,50%{opacity:1;} 50.01%,100%{opacity:0;}}

  /* idle */
  .idle{text-align:center; color:var(--amber);}
  .idle .clk{font-size:52px; font-weight:500; text-shadow:0 0 10px rgba(255,166,43,.4);}
  .idle .sub{font-size:12px; color:var(--dim); margin-top:8px;}

  .hints{font-family:"JetBrains Mono",monospace; font-size:11px; color:var(--dim); letter-spacing:.02em; text-align:center;}
  .hints b{color:#a49a8a; font-weight:500;}
  .conn{font-size:11px; color:var(--grey);}
  .conn b{color:var(--amber);}
  @media (prefers-reduced-motion: reduce){ *{animation:none !important;} }
</style>
</head>
<body>
  <div class="title">claude-dial</div>
  <div class="device" id="device"><div class="knurl" id="knurl"></div><div class="screen" id="screen"></div></div>
  <div class="hints"><b>scroll</b> / ↑↓ turn &nbsp;·&nbsp; <b>click</b> / ⏎ press &nbsp;·&nbsp; <b>tap</b> a row or choice</div>
  <div class="conn">stream <b id="conn">connecting…</b></div>

<script>
  const spin=["⣾","⣽","⣻","⢿","⡿","⣟","⣯","⣷"];
  const OPTS=[{k:"allow_once",label:"allow once"},{k:"always_allow",label:"always allow"},{k:"reject",label:"reject",rej:true}];
  const stMeta={working:{c:"work",g:"spin",l:"working"},blocked:{c:"wait",g:"●",l:"waiting"},idle:{c:"",g:"·",l:"idle"},needs_input:{c:"wait",g:"●",l:"waiting"}};

  let snap={sessions:[]}, caret=0, opt=0, rot=0, lastTop=null, connected=false;

  const pending=()=>snap.sessions.filter(s=>s.state==="permission_request");
  const roster=()=>snap.sessions.filter(s=>s.state!=="permission_request");
  const view=()=>pending().length?"perm":(snap.sessions.length?"roster":"idle");
  const esc=s=>(s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
  const clock=()=>{const d=new Date();return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");};

  async function decide(id,k){
    try{ await fetch("/decision",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({session_id:id,decision:k})}); }catch(e){}
  }

  function rotate(dir){
    rot+=dir*12; document.getElementById("knurl").style.setProperty("--rot",rot+"deg");
    const v=view();
    if(v==="perm"){ opt=(opt+dir+3)%3; render(); }
    else if(v==="roster"){ const n=roster().length; if(n){ caret=(caret+dir+n)%n; render(); } }
  }
  function press(){
    if(view()==="perm"){ const p=pending()[0]; if(p) decide(p.session_id, OPTS[opt].k); }
  }

  function render(){
    const el=document.getElementById("screen");
    const v=view();
    let inner;
    if(v==="idle"){
      inner=`<div class="idle"><div class="clk">${clock()}</div><div class="sub">waiting for claude</div></div>`;
    } else if(v==="roster"){
      const list=roster(); if(caret>=list.length) caret=0;
      const waits=list.filter(s=>s.state==="blocked"||s.state==="needs_input").length;
      const rows=list.map((s,i)=>{
        const m=stMeta[s.state]||stMeta.idle;
        const g=m.g==="spin"?`<span class="spinner">⣾</span>`:m.g;
        const nm=esc(s.project||s.session_id.slice(0,10));
        return `<div class="row ${m.c} ${i===caret?'sel':''}" data-i="${i}"><span class="car">▸</span><span class="nm">${nm}</span><span class="st">${g} ${m.l}</span></div>`;
      }).join("");
      inner=`<div class="body"><div class="hd"><span>claude <span style="color:var(--grey)">⟩</span> <span class="n">${list.length}</span> agent${list.length>1?'s':''}</span><span>${clock()}</span></div><div class="rule"></div><div class="rows">${rows}</div><div class="ft"><span class="${waits?'w':''}">${waits?waits+' waiting':'all clear'}</span><span>↻ ⏎ ✱</span></div></div>`;
    } else {
      const q=pending(), p=q[0], behind=q.length-1;
      const opts=OPTS.map((o,i)=>`<div class="opt ${o.rej?'rej':''} ${i===opt?'sel':''}" data-opt="${i}"><span class="car">▸</span>${o.label}</div>`).join("");
      inner=`<div class="body"><div class="p-hd"><span>${esc(p.project||p.session_id.slice(0,10))}</span><span class="q">${behind>0?'⟨'+behind+' more⟩':'last'}</span></div><div class="p-warn">⚠ permission required</div><div class="p-cmd">$ <span class="d">${esc((p.tool_name||'').toLowerCase())}</span> ${esc(p.command)}</div>${opts}<div class="p-ft">↻ choose · ⏎ confirm<span class="cur"></span></div></div>`;
    }
    el.innerHTML=`<div class="crt"></div><div class="vig"></div>`+inner;
    el.querySelectorAll(".row[data-i]").forEach(r=>r.onclick=e=>{e.stopPropagation(); caret=+r.dataset.i; render();});
    el.querySelectorAll(".opt[data-opt]").forEach(o=>o.onclick=e=>{e.stopPropagation(); opt=+o.dataset.opt; press();});
  }

  const dev=document.getElementById("device");
  dev.addEventListener("wheel",e=>{ e.preventDefault(); rotate(e.deltaY>0?1:-1); },{passive:false});
  dev.addEventListener("click",()=>press());
  window.addEventListener("keydown",e=>{
    if(e.key==="ArrowDown"||e.key==="ArrowRight"){e.preventDefault();rotate(1);}
    else if(e.key==="ArrowUp"||e.key==="ArrowLeft"){e.preventDefault();rotate(-1);}
    else if(e.key==="Enter"||e.key===" "){e.preventDefault();press();}
  });

  let f=0; setInterval(()=>{ f=(f+1)%spin.length; document.querySelectorAll(".spinner").forEach(el=>el.textContent=spin[f]); },110);
  setInterval(()=>{ if(view()==="idle") render(); },20000);

  const ev=new EventSource("/events");
  ev.onopen=()=>{ connected=true; const c=document.getElementById("conn"); c.textContent="connected"; c.style.color="var(--amber)"; };
  ev.onerror=()=>{ connected=false; const c=document.getElementById("conn"); c.textContent="disconnected"; c.style.color="var(--red)"; };
  ev.onmessage=e=>{
    try{ snap=JSON.parse(e.data); }catch(_){ return; }
    const top=pending()[0]; const id=top?top.session_id:null;
    if(id!==lastTop){ opt=0; lastTop=id; }
    render();
  };
  render();
</script>
</body>
</html>
