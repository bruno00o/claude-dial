; claude-dial firmware — M5Stack Dial (ESP32-S3 / StampS3)
; Starting point: lib versions may need pinning once the build is verified on-device.

[env:m5stack-dial]
platform = espressif32
board = m5stack-stamps3
framework = arduino
monitor_speed = 115200
upload_speed = 1500000

; Dual-OTA layout (app0 + app1 + otadata) so firmware can be updated over BLE.
; The StampS3 has 8 MB of flash; each app slot is ~3.3 MB (our image is ~0.7 MB).
board_build.partitions = default_8MB.csv

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    m5stack/M5Dial
    m5stack/M5Unified
    ; pinned to 1.4.x: the firmware targets the NimBLE 1.x API
    ; (onConnect/onWrite signatures, setScanResponse/setMinPreferred).
    ; TODO: migrate to NimBLE-Arduino 2.x.
    h2zero/NimBLE-Arduino @ ^1.4.3
    bblanchon/ArduinoJson @ ^7
